<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content />
        <meta name="author" content />
        <title>Modern Business - Start Bootstrap Template</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Custom Google font-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body class="d-flex flex-column contact-collage-page">
        <div class="contact-collage-bg" aria-hidden="true">
            <span class="contact-collage-tile tile-1"></span>
            <span class="contact-collage-tile tile-2"></span>
            <span class="contact-collage-tile tile-3"></span>
            <span class="contact-collage-tile tile-4"></span>
            <span class="contact-collage-tile tile-5"></span>
            <span class="contact-collage-tile tile-6"></span>
            <span class="contact-collage-tile tile-7"></span>
            <span class="contact-collage-tile tile-8"></span>
            <span class="contact-collage-tile tile-9"></span>
            <span class="contact-collage-tile tile-10"></span>
            <span class="contact-collage-tile tile-11"></span>
            <span class="contact-collage-tile tile-12"></span>
            <span class="contact-collage-tile tile-13"></span>
            <span class="contact-collage-tile tile-14"></span>
            <span class="contact-collage-tile tile-15"></span>
            <span class="contact-collage-tile tile-16"></span>
            <span class="contact-collage-tile tile-17"></span>
            <span class="contact-collage-tile tile-18"></span>
        </div>
        <main class="flex-shrink-0">
            <!-- Navigation-->
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
                <div class="container px-5">
         
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                            <li class="nav-item"><a class="nav-link" href="resume.html">Resume</a></li>
                            <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                            <li class="nav-item"><a class="nav-link" href="scratch.html">Personal Interests</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
            <!-- Page content-->
            <section class="py-5">
                <div class="container px-5">
                    <!-- Contact form-->
                    <div class="bg-light rounded-4 py-5 px-4 px-md-5 contact-video-card">
                        <video class="contact-card-video" autoplay muted loop playsinline>
                            <source src="assets/videos/stars-background.mp4" type="video/mp4" />
                        </video>
                        <div class="contact-card-overlay" aria-hidden="true"></div>
                        <div class="contact-card-content">
                            <div class="text-center mb-5">
                                <div class="feature bg-primary bg-gradient-primary-to-secondary text-white rounded-3 mb-3"><i class="bi bi-envelope"></i></div>
                                <h1 class="fw-bolder">Get in touch</h1>
                                <p class="lead fw-normal text-muted mb-0">Let's work together!</p>
                            </div>
                            <div class="row gx-5 justify-content-center">
                                <div class="col-lg-8 col-xl-6">
                                    <form action="https://formspree.io/f/mzdyagbr" method="POST">
                                    <!-- Name input-->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="name" name="name" type="text" placeholder="Enter your name..." />
                                        <label for="name">Full name</label>
                                        <div class="invalid-feedback">A name is required.</div>
                                    </div>
                                    <!-- Email address input-->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="email" name="email" type="email" placeholder="name@example.com" />
                                        <label for="email">Email address</label>
                                        <div class="invalid-feedback">An email is required.</div>
                                        <div class="invalid-feedback">Email is not valid.</div>
                                    </div>
                                    <!-- Phone number input-->
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="phone" name="phone" type="tel" placeholder="(123) 456-7890" />
                                        <label for="phone">Phone number</label>
                                        <div class="invalid-feedback">A phone number is required.</div>
                                    </div>
                                    <!-- Message input-->
                                    <div class="form-floating mb-3">
                                        <textarea class="form-control" id="message" name="message" type="text" placeholder="Enter your message here..." style="height: 10rem"></textarea>
                                        <label for="message">Message</label>
                                        <div class="invalid-feedback">A message is required.</div>
                                    </div>
                                    <input type="hidden" name="_replyto" id="replytoField" />
                                    <input type="hidden" name="_next" value="contact.html?success=1" />
                                    <div class="d-none" id="formspreeSuccessMessage">
                                        <div class="text-center mb-3">
                                            <div class="fw-bolder text-success">Message sent successfully.</div>
                                        </div>
                                    </div>
                                    <!-- Submit Button-->
                                        <div class="d-grid"><button class="btn btn-primary btn-lg" id="submitButton" type="submit">Submit</button></div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <!-- Footer-->
        <footer class="py-4 mt-auto contact-page-footer">
            <div class="container px-5">
                <div class="row align-items-center justify-content-between flex-column flex-sm-row">
                    <div class="col-auto"><div class="small m-0">Copyright &copy; Mikey Birchall Website 2026</div></div>
                    <div class="col-auto">
                       
                    </div>
                </div>
            </div>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>
        <script>
            (function () {
                const params = new URLSearchParams(window.location.search);
                if (params.get("success") === "1") {
                    const msg = document.getElementById("formspreeSuccessMessage");
                    if (msg) msg.classList.remove("d-none");
                }
                const emailInput = document.getElementById("email");
                const replyToField = document.getElementById("replytoField");
                if (emailInput && replyToField) {
                    const syncReplyTo = () => {
                        replyToField.value = emailInput.value || "";
                    };
                    emailInput.addEventListener("input", syncReplyTo);
                    syncReplyTo();
                }
            })();
        </script>
    </body>
</html>
